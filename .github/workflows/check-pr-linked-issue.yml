name: Check PR Linked Issue

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]

permissions:
  pull-requests: read

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR body for closing issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const hasClosingReference = body
              .split(/\r?\n/)
              .some((line) => /^\s*(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+\s*$/i.test(line));

            if (!hasClosingReference) {
              core.setFailed(
                "PR body must include a standalone closing issue reference on its own line, such as `Closes #123`, `Fixes #123`, or `Resolves #123`."
              );
            }