name: Sync PR Labels From Linked Issue

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]

permissions:
  issues: write
  pull-requests: read

jobs:
  sync-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Copy labels from linked issue to PR
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const body = pullRequest.body || "";
            const match = body.match(/\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/i);

            if (!match) {
              core.info("No closing issue reference found in PR body. Nothing to sync.");
              return;
            }

            const issueNumber = Number(match[1]);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });

            const labels = issue.labels
              .map((label) => (typeof label === "string" ? label : label.name))
              .filter(Boolean);

            if (labels.length === 0) {
              core.info(`Issue #${issueNumber} has no labels to copy.`);
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pullRequest.number,
              labels,
            });

            core.info(`Copied labels from issue #${issueNumber} to PR #${pullRequest.number}: ${labels.join(", ")}`);